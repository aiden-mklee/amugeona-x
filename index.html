<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아무거나금지</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🍱 아무거나금지</h1>

    <div class="status-bar">
      <span id="status">📍 위치를 가져오는 중...</span>
      <button class="refresh-btn" onclick="loadRestaurants()" title="새로 불러오기">↺</button>
    </div>

    <div class="location-bar">
      <input type="text" id="locationInput" placeholder="동네 직접 입력 (예: 역삼동, 홍대)" />
      <button class="location-search-btn" onclick="searchManual()">검색</button>
    </div>

    <div class="result-box" id="resultBox">
      <span id="resultEmoji">🎲</span>
      <span id="resultText">?</span>
      <span id="resultSub"></span>
      <span id="resultMenus"></span>
    </div>

    <button class="pick-btn" id="pickBtn" onclick="pickRestaurant()">
      오늘 식당 추천받기
    </button>

    <div class="category-filter">
      <span class="filter-label">카테고리</span>
      <div class="chips" id="chips">
        <button class="chip active" data-cat="all" onclick="setCategory('all')">전체</button>
      </div>
    </div>

    <div class="menu-list" id="menuList">
      <div class="loading">식당 정보를 불러오는 중...</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
